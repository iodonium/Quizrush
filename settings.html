<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuizRush Settings</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Baloo 2',cursive;
    -webkit-tap-highlight-color:transparent;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
    180deg,
    #120824,
    #111827,
    #09111f
    );

    color:white;

    overflow-x:hidden;
}

/* BACKGROUND */

.bg{

    position:fixed;
    inset:0;
    z-index:0;

    overflow:hidden;
}

.blur{

    position:absolute;

    border-radius:50%;

    filter:blur(120px);

    opacity:0.5;
}

.b1{

    width:320px;
    height:320px;

    background:#8b5cf6;

    top:-120px;
    left:-120px;
}

.b2{

    width:300px;
    height:300px;

    background:#06b6d4;

    right:-120px;
    top:25%;
}

.b3{

    width:250px;
    height:250px;

    background:#ec4899;

    bottom:-100px;
    left:-80px;
}

/* CONTAINER */

.container{

    position:relative;

    z-index:2;

    width:100%;

    padding:18px 18px 40px;
}

/* HEADER */

.header{

    display:flex;

    align-items:center;

    gap:14px;

    margin-bottom:30px;
}

.back-btn{

    width:54px;
    height:54px;

    border:none;

    border-radius:18px;

    background:
    rgba(255,255,255,0.1);

    border:
    2px solid rgba(255,255,255,0.08);

    color:white;

    font-size:24px;

    cursor:pointer;
}

.title{

    font-size:38px;

    font-weight:800;

    background:
    linear-gradient(
    90deg,
    #38bdf8,
    #8b5cf6,
    #ec4899
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

/* CARD */

.card{

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:
    2px solid rgba(255,255,255,0.08);

    border-radius:34px;

    padding:24px;
}

/* PROFILE */

.profile-wrap{

    display:flex;

    flex-direction:column;

    align-items:center;

    margin-bottom:28px;
}

.profile{

    width:130px;
    height:130px;

    border-radius:50%;

    overflow:hidden;

    border:4px solid #67e8f9;
}

.profile img{

    width:100%;
    height:100%;

    object-fit:cover;
}

.change-btn{

    margin-top:16px;

    border:none;

    padding:13px 20px;

    border-radius:20px;

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );

    color:white;

    font-size:16px;

    font-weight:800;

    cursor:pointer;
}

/* INPUT */

.label{

    display:block;

    font-size:18px;

    font-weight:700;

    margin-bottom:10px;
}

.input{

    width:100%;

    border:none;

    outline:none;

    padding:18px;

    border-radius:22px;

    background:
    rgba(255,255,255,0.08);

    border:
    2px solid rgba(255,255,255,0.08);

    color:white;

    font-size:17px;

    margin-bottom:24px;
}

.input::placeholder{

    color:#cbd5e1;
}

/* BUTTONS */

.btn{

    width:100%;

    border:none;

    padding:18px;

    border-radius:24px;

    font-size:18px;

    font-weight:800;

    color:white;

    cursor:pointer;

    margin-top:14px;
}

.save-btn{

    background:
    linear-gradient(
    135deg,
    #22c55e,
    #06b6d4
    );
}

.logout-btn{

    background:
    linear-gradient(
    135deg,
    #f59e0b,
    #ef4444
    );
}

.delete-btn{

    background:
    linear-gradient(
    135deg,
    #dc2626,
    #991b1b
    );
}

/* DELETE BOX */

.delete-box{

    margin-top:22px;

    padding:18px;

    border-radius:24px;

    background:
    rgba(255,0,0,0.08);

    border:
    2px solid rgba(255,0,0,0.15);
}

.delete-text{

    font-size:15px;

    color:#fecaca;

    margin-bottom:12px;

    line-height:1.5;
}

</style>
</head>

<body>

<div class="bg">

<div class="blur b1"></div>
<div class="blur b2"></div>
<div class="blur b3"></div>

</div>

<audio id="click">
<source src="assets/audio/click.mp3"
type="audio/mpeg">
</audio>

<div class="container">

<div class="header">

<button class="back-btn"
onclick="goBack()">

←

</button>

<h1 class="title">
Settings
</h1>

</div>

<div class="card">

<div class="profile-wrap">

<div class="profile">

<img id="profilePic"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

</div>

<button class="change-btn"
onclick="pickPhoto()">

📸 Change Photo

</button>

<input type="file"
id="photoInput"
accept="image/*"
hidden>

</div>

<label class="label">
Display Name
</label>

<input type="text"
class="input"
id="nameInput"
placeholder="Enter your name">

<button class="btn save-btn"
onclick="saveProfile()">

💾 SAVE PROFILE

</button>

<button class="btn logout-btn"
onclick="logout()">

🚪 LOGOUT

</button>

<div class="delete-box">

<div class="delete-text">

Type <b>DELETE</b> below to permanently delete your account.

</div>

<input type="text"
class="input"
id="deleteInput"
placeholder="Type DELETE">

<button class="btn delete-btn"
onclick="deleteAccount()">

🗑 DELETE ACCOUNT

</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

onAuthStateChanged,

signOut,

deleteUser

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {

apiKey:
"AIzaSyB5KdyKgHVuvmKRhu-tQQKaBsbUH9-Pz-E",

authDomain:
"iodonium-r-ea28a.firebaseapp.com",

projectId:
"iodonium-r-ea28a",

storageBucket:
"iodonium-r-ea28a.firebasestorage.app",

messagingSenderId:
"556058248851",

appId:
"1:556058248851:web:132044a66f3095646c6f66",

measurementId:
"G-Y71J98XK25"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const click =
document.getElementById("click");

let selectedPhoto = "";

/* SOUND */

function sound(){

    click.currentTime = 0;

    click.play()
    .catch(()=>{});
}

/* LOAD USER */

onAuthStateChanged(
auth,
(user)=>{

    if(user){

        const savedName =
        localStorage.getItem("quizrush_name");

        const savedPhoto =
        localStorage.getItem("quizrush_photo");

        document
        .getElementById("nameInput")
        .value =
        savedName ||
        user.displayName ||
        "";

        document
        .getElementById("profilePic")
        .src =
        savedPhoto ||
        user.photoURL;

        selectedPhoto =
        savedPhoto ||
        user.photoURL;

    }else{

        window.location.href =
        "index.html";
    }
});

/* BACK */

window.goBack = function(){

    sound();

    setTimeout(()=>{

        window.location.href =
        "index.html";

    },150);
};

/* PHOTO PICK */

window.pickPhoto = function(){

    sound();

    document
    .getElementById("photoInput")
    .click();
};

/* PHOTO PREVIEW */

document
.getElementById("photoInput")
.addEventListener(
"change",
(event)=>{

    const file =
    event.target.files[0];

    if(!file)return;

    const reader =
    new FileReader();

    reader.onload =
    function(e){

        /* REMOVE OLD IMAGE */

        localStorage.removeItem(
        "quizrush_photo"
        );

        selectedPhoto =
        e.target.result;

        document
        .getElementById("profilePic")
        .src =
        selectedPhoto;
    };

    reader.readAsDataURL(file);
});

/* SAVE */

window.saveProfile =
function(){

    sound();

    const name =
    document
    .getElementById("nameInput")
    .value
    .trim();

    if(name.length < 2){

        alert("Enter valid name");

        return;
    }

    /* REMOVE OLD DATA */

    localStorage.removeItem(
    "quizrush_name"
    );

    localStorage.removeItem(
    "quizrush_photo"
    );

    /* SAVE NEW */

    localStorage.setItem(
    "quizrush_name",
    name
    );

    localStorage.setItem(
    "quizrush_photo",
    selectedPhoto
    );

    alert("Profile Updated");

    setTimeout(()=>{

        window.location.href =
        "index.html";

    },600);
};

/* LOGOUT */

window.logout =
async function(){

    sound();

    try{

        await signOut(auth);

        localStorage.clear();

        alert("Logged Out");

        setTimeout(()=>{

            window.location.href =
            "index.html";

        },400);

    }catch(error){

        alert(error.message);
    }
};

/* DELETE ACCOUNT */

window.deleteAccount =
async function(){

    sound();

    const value =
    document
    .getElementById("deleteInput")
    .value;

    if(value !== "DELETE"){

        alert("Type DELETE correctly");

        return;
    }

    try{

        const user =
        auth.currentUser;

        await deleteUser(user);

        localStorage.clear();

        alert("Account Deleted");

        setTimeout(()=>{

            window.location.href =
            "index.html";

        },500);

    }catch(error){

        alert(
        "Re-login required before deleting account."
        );

        console.log(error);
    }
};

</script>

</body>
</html>
