<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuizRush</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    background:
    linear-gradient(
    180deg,
    #13082c,
    #0e1538,
    #091423
    );

    color:white;
}

body::-webkit-scrollbar{
    width:0;
}

.bg{

    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
}

.wave{

    position:absolute;

    border-radius:50%;

    filter:blur(110px);

    opacity:0.55;
}

.w1{

    width:380px;
    height:380px;

    background:#8b5cf6;

    top:-100px;
    left:-120px;
}

.w2{

    width:420px;
    height:420px;

    background:#06b6d4;

    top:25%;
    right:-150px;
}

.w3{

    width:300px;
    height:300px;

    background:#ec4899;

    bottom:-80px;
    left:-80px;
}

.w4{

    width:280px;
    height:280px;

    background:#f59e0b;

    bottom:5%;
    right:-90px;
}

.stars{

    position:absolute;
    inset:0;

    background-image:
    radial-gradient(
    rgba(255,255,255,0.9) 1px,
    transparent 1px
    );

    background-size:38px 38px;

    opacity:0.28;
}

.container{

    position:relative;

    z-index:2;

    width:100%;

    padding:20px 18px 50px;
}

.topbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:28px;
}

.xp{

    display:flex;

    align-items:center;

    gap:10px;

    background:
    linear-gradient(
    135deg,
    #fde68a,
    #fbbf24
    );

    padding:14px 22px;

    border-radius:26px;

    box-shadow:
    0 10px 30px rgba(251,191,36,0.35);

    border:
    2px solid rgba(255,255,255,0.25);
}

.xp span{

    font-size:20px;

    font-weight:800;

    color:#7c2d12;
}

.profile{

    width:82px;
    height:82px;

    border-radius:50%;

    overflow:hidden;

    border:4px solid #67e8f9;

    box-shadow:
    0 0 35px rgba(103,232,249,0.7);

    cursor:pointer;
}

.profile img{

    width:100%;
    height:100%;

    object-fit:cover;
}

.hero{

    margin-bottom:26px;
}

.logo{

    font-size:68px;

    font-weight:800;

    line-height:1;

    letter-spacing:-2px;

    background:
    linear-gradient(
    90deg,
    #ff6b6b,
    #f59e0b,
    #84cc16,
    #22c55e,
    #38bdf8,
    #8b5cf6,
    #ec4899
    );

    background-size:400% 400%;

    animation:gradientMove 8s ease infinite;

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 25px rgba(255,255,255,0.3);
}

@keyframes gradientMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

.subtitle{

    margin-top:14px;

    font-size:18px;

    line-height:1.6;

    color:rgba(255,255,255,0.9);

    max-width:500px;
}

.login-btn{

    width:100%;

    margin-top:24px;

    border:none;

    outline:none;

    padding:18px;

    border-radius:24px;

    font-size:18px;

    font-weight:700;

    color:white;

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );

    box-shadow:
    0 12px 35px rgba(139,92,246,0.4);

    cursor:pointer;

    transition:0.25s;
}

.login-btn:active{

    transform:scale(0.97);
}

.grid{

    display:grid;

    grid-template-columns:1fr;

    gap:24px;
}

.card{

    position:relative;

    overflow:hidden;

    border:none;

    border-radius:38px;

    padding:28px;

    min-height:260px;

    text-align:left;

    color:white;

    cursor:pointer;

    transition:0.25s;

    box-shadow:
    0 18px 40px rgba(0,0,0,0.35);

    border:
    2px solid rgba(255,255,255,0.18);
}

.card:active{

    transform:scale(0.985);
}

.card::before{

    content:'';

    position:absolute;

    width:230px;
    height:230px;

    border-radius:50%;

    background:
    rgba(255,255,255,0.12);

    top:-80px;
    right:-60px;
}

.card img{

    width:110px;

    position:relative;

    z-index:2;

    filter:
    drop-shadow(
    0 8px 18px rgba(0,0,0,0.35)
    );
}

.float-right{

    position:absolute;

    right:18px;
    top:16px;

    width:130px !important;
}

.card h2{

    margin-top:26px;

    font-size:28px;

    line-height:1.15;

    font-weight:800;

    text-shadow:
    0 5px 12px rgba(0,0,0,0.4);

    position:relative;

    z-index:2;
}

.card p{

    margin-top:12px;

    font-size:16px;

    line-height:1.6;

    color:
    rgba(255,255,255,0.92);

    position:relative;

    z-index:2;
}

.c1{

    background:
    linear-gradient(
    135deg,
    #1d9bf0,
    #34d399
    );
}

.c2{

    background:
    linear-gradient(
    135deg,
    #9333ea,
    #ec4899
    );
}

.c3{

    background:
    linear-gradient(
    135deg,
    #d97706,
    #fde68a
    );

    color:#3f2200;
}

.c3 p{
    color:#5b3100;
}

.c4{

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #2563eb
    );
}

.hidden{
    display:none;
}

.footer{

    margin-top:35px;

    text-align:center;

    color:rgba(255,255,255,0.55);

    font-size:14px;
}

@media(min-width:700px){

    .container{

        max-width:760px;

        margin:auto;
    }

    .logo{
        font-size:86px;
    }

    .grid{

        grid-template-columns:
        repeat(2,1fr);
    }
}

</style>
</head>

<body>

<div class="bg">

<div class="wave w1"></div>
<div class="wave w2"></div>
<div class="wave w3"></div>
<div class="wave w4"></div>

<div class="stars"></div>

</div>

<audio id="bgm" loop>
<source src="bgm.mp3"
type="audio/mpeg">
</audio>

<audio id="click">
<source src="click.mp3"
type="audio/mpeg">
</audio>

<div class="container">

<div class="topbar">

<div class="xp">

<div style="font-size:34px">
⭐
</div>

<span>
XP: <span id="xp">0</span>
</span>

</div>

<div class="profile"
onclick="goPage('settings.html')">

<img id="profilePic"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

</div>

</div>

<div class="hero">

<h1 class="logo">
QuizRush
</h1>

<p class="subtitle">
Multiplayer flag, country and currency battle experience for kids!
</p>

<button class="login-btn"
id="loginBtn">

🚀 Login With Google

</button>

</div>

<div class="grid hidden"
id="menu">

<button class="card c1"
onclick="goPage('computer.html')">

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

<img class="float-right"
src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">

<h2>
PLAY VS BOT-PAL
</h2>

<p>
Play quiz battles against friendly bots!
</p>

</button>

<button class="card c2"
onclick="goPage('multiplayer.html')">

<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

<img class="float-right"
src="https://cdn-icons-png.flaticon.com/512/706/706830.png">

<h2>
MULTIPLAYER PARTY
</h2>

<p>
Compete with friends online for fun prizes!
</p>

</button>

<button class="card c3"
onclick="goPage('leaderboard.html')">

<img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png">

<h2>
LEADERBOARDS
</h2>

<p>
Global rankings - See where you and your friends stand!
</p>

</button>

<button class="card c4"
onclick="goPage('settings.html')">

<img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png">

<h2>
SETTINGS
</h2>

<p>
Customize sounds, profile and gameplay settings.
</p>

</button>

</div>

<div class="footer">
QuizRush © 2025
</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

GoogleAuthProvider,

signInWithPopup,

onAuthStateChanged

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

doc,

getDoc,

setDoc

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"YOUR_API_KEY",

authDomain:
"YOUR_AUTH_DOMAIN",

projectId:
"YOUR_PROJECT_ID",

storageBucket:
"YOUR_STORAGE_BUCKET",

messagingSenderId:
"YOUR_SENDER_ID",

appId:
"YOUR_APP_ID"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

const provider =
new GoogleAuthProvider();

const bgm =
document.getElementById("bgm");

const click =
document.getElementById("click");

function playClick(){

click.currentTime = 0;

click.play();
}

window.goPage = function(page){

playClick();

setTimeout(()=>{

window.location.href = page;

},120);
};

async function login(){

playClick();

try{

const result =
await signInWithPopup(
auth,
provider
);

const user =
result.user;

const ref =
doc(
db,
"users",
user.uid
);

const snap =
await getDoc(ref);

if(!snap.exists()){

await setDoc(ref,{

name:
user.displayName,

photo:
user.photoURL,

xp:0,

createdAt:
Date.now()

});
}

const latest =
await getDoc(ref);

const data =
latest.data();

document
.getElementById("profilePic")
.src =
user.photoURL;

document
.getElementById("xp")
.innerText =
data.xp || 0;

document
.getElementById("menu")
.classList.remove("hidden");

document
.getElementById("loginBtn")
.classList.add("hidden");

bgm.volume = 0.4;

bgm.play();

}catch(error){

alert(error.message);

console.log(error);
}
}

onAuthStateChanged(
auth,
async(user)=>{

if(user){

const ref =
doc(
db,
"users",
user.uid
);

const snap =
await getDoc(ref);

if(snap.exists()){

const data =
snap.data();

document
.getElementById("profilePic")
.src =
user.photoURL;

document
.getElementById("xp")
.innerText =
data.xp || 0;

document
.getElementById("menu")
.classList.remove("hidden");

document
.getElementById("loginBtn")
.classList.add("hidden");

bgm.volume = 0.4;

bgm.play()
.catch(()=>{});
}
}
});

document
.getElementById("loginBtn")
.onclick = login;

document.addEventListener(
"click",
()=>{

bgm.play()
.catch(()=>{});

},{
once:true
});

</script>

</body>
</html>
