<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuizRush Dashboard</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

html{
    scroll-behavior:smooth;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    background:
    linear-gradient(
    180deg,
    #070b16,
    #0f172a,
    #111827
    );

    color:white;
}

body::-webkit-scrollbar{
    width:0;
}

.bg{

    position:fixed;
    inset:0;
    z-index:0;

    overflow:hidden;
}

.glow{

    position:absolute;

    border-radius:50%;

    filter:blur(100px);

    opacity:0.45;
}

.g1{

    width:300px;
    height:300px;

    background:#8b5cf6;

    top:-120px;
    left:-100px;
}

.g2{

    width:350px;
    height:350px;

    background:#06b6d4;

    right:-120px;
    top:25%;
}

.g3{

    width:260px;
    height:260px;

    background:#3b82f6;

    bottom:-80px;
    left:-80px;
}

.stars{

    position:absolute;
    inset:0;

    background-image:
    radial-gradient(
    rgba(255,255,255,0.8) 1px,
    transparent 1px
    );

    background-size:35px 35px;

    opacity:0.12;
}

.container{

    position:relative;

    z-index:2;

    width:100%;

    padding:18px 18px 120px;
}

/* TOPBAR */

.topbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:24px;
}

.xp-box{

    border:none;

    display:flex;

    align-items:center;

    gap:10px;

    padding:10px 16px;

    border-radius:22px;

    cursor:pointer;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(16px);

    border:
    1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 10px 25px rgba(0,0,0,0.25);

    transition:0.2s;
}

.xp-box:active{

    transform:scale(0.96);
}

.xp-icon{

    width:34px;
    height:34px;

    border-radius:12px;

    display:flex;

    align-items:center;

    justify-content:center;

    background:
    linear-gradient(
    135deg,
    #facc15,
    #f59e0b
    );

    font-size:16px;

    box-shadow:
    0 0 18px rgba(250,204,21,0.35);
}

.xp-info{

    display:flex;

    flex-direction:column;

    align-items:flex-start;
}

.xp-label{

    font-size:10px;

    font-weight:600;

    color:#94a3b8;

    letter-spacing:1px;
}

.xp-value{

    font-size:18px;

    font-weight:700;

    color:white;
}

.profile{

    width:56px;
    height:56px;

    border-radius:50%;

    overflow:hidden;

    border:2px solid #67e8f9;

    box-shadow:
    0 0 22px rgba(103,232,249,0.45);

    cursor:pointer;
}

.profile img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* HERO */

.hero{

    margin-bottom:26px;
}

.logo{

    font-size:56px;

    font-weight:800;

    line-height:1;

    letter-spacing:-2px;

    background:
    linear-gradient(
    90deg,
    #38bdf8,
    #818cf8,
    #ec4899
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.subtitle{

    margin-top:14px;

    font-size:16px;

    line-height:1.7;

    color:
    rgba(255,255,255,0.8);
}

.login-btn{

    width:100%;

    margin-top:22px;

    border:none;

    padding:17px;

    border-radius:22px;

    font-size:16px;

    font-weight:700;

    color:white;

    cursor:pointer;

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );

    box-shadow:
    0 12px 35px rgba(139,92,246,0.4);

    transition:0.2s;
}

.login-btn:active{

    transform:scale(0.98);
}

/* GRID */

.grid{

    display:grid;

    grid-template-columns:1fr;

    gap:18px;
}

.card{

    position:relative;

    overflow:hidden;

    border:none;

    border-radius:32px;

    padding:22px;

    min-height:210px;

    text-align:left;

    color:white;

    cursor:pointer;

    transition:0.2s;

    border:
    1px solid rgba(255,255,255,0.12);

    box-shadow:
    0 15px 35px rgba(0,0,0,0.35);
}

.card:active{

    transform:scale(0.985);
}

.card::before{

    content:'';

    position:absolute;

    width:200px;
    height:200px;

    border-radius:50%;

    background:
    rgba(255,255,255,0.08);

    top:-70px;
    right:-60px;
}

.card img{

    width:90px;

    position:relative;

    z-index:2;

    filter:
    drop-shadow(
    0 8px 16px rgba(0,0,0,0.3)
    );
}

.float{

    position:absolute;

    top:18px;
    right:18px;

    width:110px !important;
}

.card h2{

    margin-top:22px;

    font-size:24px;

    line-height:1.2;

    font-weight:800;

    position:relative;

    z-index:2;
}

.card p{

    margin-top:10px;

    font-size:14px;

    line-height:1.6;

    color:
    rgba(255,255,255,0.9);

    position:relative;

    z-index:2;
}

.c1{

    background:
    linear-gradient(
    135deg,
    #0ea5e9,
    #22c55e
    );
}

.c2{

    background:
    linear-gradient(
    135deg,
    #8b5cf6,
    #ec4899
    );
}

.c3{

    background:
    linear-gradient(
    135deg,
    #2563eb,
    #06b6d4
    );
}

.c4{

    background:
    linear-gradient(
    135deg,
    #f59e0b,
    #facc15
    );

    color:#3f2200;
}

.c4 p{
    color:#5f3700;
}

.hidden{
    display:none;
}

/* NAVBAR */

.bottom-nav{

    position:fixed;

    left:0;
    right:0;
    bottom:0;

    z-index:100;

    display:flex;

    justify-content:space-around;

    align-items:center;

    padding:14px 10px calc(14px + env(safe-area-inset-bottom));

    background:
    rgba(8,15,30,0.85);

    backdrop-filter:blur(20px);

    border-top:
    1px solid rgba(255,255,255,0.08);
}

.nav-btn{

    border:none;

    background:none;

    color:white;

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:6px;

    font-size:12px;

    font-weight:600;

    cursor:pointer;

    opacity:0.75;
}

.nav-btn.active{
    opacity:1;
}

.nav-icon{

    width:50px;
    height:50px;

    border-radius:16px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:22px;

    background:
    rgba(255,255,255,0.06);
}

.active .nav-icon{

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );

    box-shadow:
    0 10px 25px rgba(139,92,246,0.35);
}

@media(min-width:700px){

    .container{

        max-width:760px;

        margin:auto;
    }

    .grid{

        grid-template-columns:
        repeat(2,1fr);
    }

    .logo{
        font-size:72px;
    }
}

</style>
</head>

<body>

<div class="bg">

<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="glow g3"></div>

<div class="stars"></div>

</div>

<!-- AUDIO -->

<audio id="bgm" loop>
<source src="assets/audio/bgm.mp3"
type="audio/mpeg">
</audio>

<audio id="click">
<source src="assets/audio/click.mp3"
type="audio/mpeg">
</audio>

<div class="container">

<!-- TOPBAR -->

<div class="topbar hidden"
id="topbar">

<button class="xp-box"
onclick="goPage('leaderboard.html')">

<div class="xp-icon">
⭐
</div>

<div class="xp-info">

<span class="xp-label">
XP
</span>

<span class="xp-value"
id="xp">
0
</span>

</div>

</button>

<div class="profile"
onclick="goPage('settings.html')">

<img id="profilePic"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

</div>

</div>

<!-- HERO -->

<div class="hero">

<h1 class="logo">
QuizRush
</h1>

<p class="subtitle">
Battle friends, challenge bots and climb the global leaderboard.
</p>

<button class="login-btn"
id="loginBtn">

🚀 Login With Google

</button>

</div>

<!-- MENU -->

<div class="grid hidden"
id="menu">

<button class="card c1"
onclick="goPage('computer.html')">

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

<img class="float"
src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">

<h2>
Play vs AI
</h2>

<p>
Practice against smart quiz bots.
</p>

</button>

<button class="card c2"
onclick="goPage('multiplayer.html')">

<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

<h2>
Multiplayer
</h2>

<p>
Battle real players online live.
</p>

</button>

<button class="card c3"
onclick="goPage('friends.html')">

<img src="https://cdn-icons-png.flaticon.com/512/681/681494.png">

<h2>
Friends
</h2>

<p>
Add friends and challenge them.
</p>

</button>

<button class="card c4"
onclick="goPage('leaderboard.html')">

<img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png">

<h2>
Leaderboard
</h2>

<p>
Check top ranked global players.
</p>

</button>

</div>

</div>

<!-- NAVIGATION -->

<div class="bottom-nav hidden"
id="bottomNav">

<button class="nav-btn active"
onclick="goPage('dashboard.html')">

<div class="nav-icon">
🏠
</div>

Home

</button>

<button class="nav-btn"
onclick="goPage('leaderboard.html')">

<div class="nav-icon">
🏆
</div>

Leaderboard

</button>

<button class="nav-btn"
onclick="goPage('friends.html')">

<div class="nav-icon">
👥
</div>

Friends

</button>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import { getAnalytics }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";

import {

getAuth,

GoogleAuthProvider,

signInWithPopup,

onAuthStateChanged

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

doc,

getDoc,

setDoc

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyB5KdyKgHVuvmKRhu-tQQKaBsbUH9-Pz-E",

authDomain:
"iodonium-r-ea28a.firebaseapp.com",

projectId:
"iodonium-r-ea28a",

storageBucket:
"iodonium-r-ea28a.firebasestorage.app",

messagingSenderId:
"556058248851",

appId:
"1:556058248851:web:132044a66f3095646c6f66",

measurementId:
"G-Y71J98XK25"

};

const app =
initializeApp(firebaseConfig);

getAnalytics(app);

const auth =
getAuth(app);

const db =
getFirestore(app);

const provider =
new GoogleAuthProvider();

const bgm =
document.getElementById("bgm");

const click =
document.getElementById("click");

bgm.volume = 0.35;

click.volume = 0.6;

/* SOUND */

function playClick(){

    click.currentTime = 0;

    click.play()
    .catch(()=>{});
}

/* PAGE NAVIGATION */

window.goPage = function(page){

    playClick();

    setTimeout(()=>{

        window.location.href = page;

    },120);
};

/* UI SHOW */

function showDashboard(user,data){

    document
    .getElementById("menu")
    .classList
    .remove("hidden");

    document
    .getElementById("bottomNav")
    .classList
    .remove("hidden");

    document
    .getElementById("topbar")
    .classList
    .remove("hidden");

    document
    .getElementById("loginBtn")
    .classList
    .add("hidden");

    document
    .getElementById("profilePic")
    .src =
    user.photoURL;

    document
    .getElementById("xp")
    .innerText =
    data.xp || 0;
}

/* LOGIN */

async function login(){

    playClick();

    try{

        const result =
        await signInWithPopup(
        auth,
        provider
        );

        const user =
        result.user;

        const ref =
        doc(
        db,
        "users",
        user.uid
        );

        const snap =
        await getDoc(ref);

        if(!snap.exists()){

            await setDoc(ref,{

                name:
                user.displayName,

                photo:
                user.photoURL,

                xp:0,

                createdAt:
                Date.now()

            });
        }

        const latest =
        await getDoc(ref);

        const data =
        latest.data();

        showDashboard(user,data);

        bgm.play()
        .catch(()=>{});

    }catch(error){

        alert(error.message);

        console.log(error);
    }
}

/* AUTH CHECK */

onAuthStateChanged(
auth,
async(user)=>{

    if(user){

        const ref =
        doc(
        db,
        "users",
        user.uid
        );

        const snap =
        await getDoc(ref);

        if(snap.exists()){

            const data =
            snap.data();

            showDashboard(user,data);

            bgm.play()
            .catch(()=>{});
        }

    }else{

        document
        .getElementById("menu")
        .classList
        .add("hidden");

        document
        .getElementById("bottomNav")
        .classList
        .add("hidden");

        document
        .getElementById("topbar")
        .classList
        .add("hidden");

        document
        .getElementById("loginBtn")
        .classList
        .remove("hidden");
    }
});

document
.getElementById("loginBtn")
.onclick =
login;

/* AUTO ENABLE AUDIO */

document.addEventListener(
"click",
()=>{

    bgm.play()
    .catch(()=>{});

},{
once:true
});

</script>

</body>
</html>
