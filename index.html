<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuizRush</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Baloo 2',cursive;
    -webkit-tap-highlight-color:transparent;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    background:
    linear-gradient(
    180deg,
    #12071f,
    #0f172a,
    #08111d
    );

    color:white;
}

/* BACKGROUND */

.bg{

    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
}

.blur{

    position:absolute;

    border-radius:50%;

    filter:blur(120px);

    opacity:0.45;

    animation:float 8s ease-in-out infinite;
}

.b1{

    width:300px;
    height:300px;

    background:#8b5cf6;

    top:-120px;
    left:-120px;
}

.b2{

    width:320px;
    height:320px;

    background:#06b6d4;

    right:-140px;
    top:15%;
}

.b3{

    width:240px;
    height:240px;

    background:#ec4899;

    bottom:-80px;
    left:-80px;
}

.b4{

    width:220px;
    height:220px;

    background:#22c55e;

    right:-70px;
    bottom:10%;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-18px);
    }

    100%{
        transform:translateY(0px);
    }
}

.stars{

    position:absolute;
    inset:0;

    background-image:
    radial-gradient(
    rgba(255,255,255,0.8) 1px,
    transparent 1px
    );

    background-size:40px 40px;

    opacity:0.12;
}

/* CONTAINER */

.container{

    position:relative;

    z-index:2;

    width:100%;

    padding:16px 16px 120px;
}

/* TOPBAR */

.topbar{

    display:none;

    justify-content:space-between;

    align-items:center;

    margin-bottom:18px;
}

.xp-box{

    border:none;

    display:flex;

    align-items:center;

    gap:10px;

    padding:9px 14px;

    border-radius:22px;

    cursor:pointer;

    background:
    rgba(255,255,255,0.08);

    border:
    1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    box-shadow:
    0 10px 30px rgba(0,0,0,0.35);
}

.xp-icon{

    width:30px;
    height:30px;

    border-radius:10px;

    display:flex;

    align-items:center;

    justify-content:center;

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );

    font-size:14px;
}

.xp-info{

    display:flex;

    flex-direction:column;
}

.xp-label{

    font-size:10px;

    color:#cbd5e1;

    line-height:1;
}

.xp-value{

    font-size:16px;

    font-weight:800;
}

.profile{

    width:48px;
    height:48px;

    border-radius:50%;

    overflow:hidden;

    border:2px solid #67e8f9;

    box-shadow:
    0 0 18px rgba(103,232,249,0.5);

    cursor:pointer;
}

.profile img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* HERO */

.hero{

    text-align:center;
}

.logo{

    font-size:58px;

    font-weight:800;

    line-height:1;

    background:
    linear-gradient(
    90deg,
    #38bdf8,
    #8b5cf6,
    #ec4899
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.subtitle{

    margin-top:10px;

    font-size:15px;

    line-height:1.5;

    color:#dbeafe;
}

.character{

    width:200px;

    margin-top:18px;

    animation:floatChar 3s ease-in-out infinite;
}

@keyframes floatChar{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* POLICY */

.policy{

    margin-top:22px;

    display:flex;

    align-items:flex-start;

    gap:10px;

    text-align:left;

    background:
    rgba(255,255,255,0.07);

    border:
    1px solid rgba(255,255,255,0.08);

    padding:14px;

    border-radius:18px;
}

.policy input{

    margin-top:5px;

    width:18px;
    height:18px;
}

.policy span{

    font-size:13px;

    color:#dbeafe;
}

.policy a{

    color:#67e8f9;

    text-decoration:none;

    font-weight:700;
}

/* LOGIN */

.login-btn{

    width:100%;

    margin-top:18px;

    border:none;

    outline:none;

    padding:17px;

    border-radius:26px;

    font-size:17px;

    font-weight:800;

    color:white;

    cursor:pointer;

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );

    box-shadow:
    0 12px 35px rgba(139,92,246,0.35);
}

.login-btn:active{

    transform:scale(0.97);
}

/* MENU */

.grid{

    display:none;

    grid-template-columns:1fr;

    gap:18px;

    margin-top:26px;
}

.card{

    position:relative;

    overflow:hidden;

    border:none;

    border-radius:32px;

    padding:22px;

    min-height:200px;

    text-align:left;

    color:white;

    cursor:pointer;

    border:
    1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 18px 40px rgba(0,0,0,0.35);
}

.card::before{

    content:'';

    position:absolute;

    width:180px;
    height:180px;

    border-radius:50%;

    background:
    rgba(255,255,255,0.12);

    top:-70px;
    right:-70px;
}

.card img{

    width:100px;

    position:absolute;

    right:12px;
    bottom:12px;
}

.card h2{

    font-size:26px;

    line-height:1.1;

    position:relative;

    z-index:2;
}

.card p{

    margin-top:10px;

    font-size:14px;

    line-height:1.5;

    max-width:170px;

    color:
    rgba(255,255,255,0.92);

    position:relative;

    z-index:2;
}

.c1{
    background:
    linear-gradient(
    135deg,
    #0ea5e9,
    #14b8a6
    );
}

.c2{
    background:
    linear-gradient(
    135deg,
    #8b5cf6,
    #ec4899
    );
}

.c3{
    background:
    linear-gradient(
    135deg,
    #f59e0b,
    #facc15
    );

    color:#4a2b00;
}

.c3 p{
    color:#5f3700;
}

.c4{
    background:
    linear-gradient(
    135deg,
    #2563eb,
    #06b6d4
    );
}

/* NAV */

.bottom-nav{

    position:fixed;

    left:12px;
    right:12px;
    bottom:12px;

    z-index:100;

    display:none;

    justify-content:space-around;

    align-items:center;

    padding:12px;

    border-radius:30px;

    background:
    rgba(15,23,42,0.75);

    backdrop-filter:blur(20px);

    border:
    1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 10px 40px rgba(0,0,0,0.4);
}

.nav-btn{

    border:none;

    background:none;

    color:white;

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:5px;

    font-size:11px;

    font-weight:700;

    cursor:pointer;
}

.nav-icon{

    width:46px;
    height:46px;

    border-radius:15px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:20px;

    background:
    rgba(255,255,255,0.08);
}

.active .nav-icon{

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );
}

@media(min-width:700px){

    .container{

        max-width:760px;

        margin:auto;
    }

    .grid{

        grid-template-columns:
        repeat(2,1fr);
    }
}

</style>
</head>

<body>

<div class="bg">

<div class="blur b1"></div>
<div class="blur b2"></div>
<div class="blur b3"></div>
<div class="blur b4"></div>

<div class="stars"></div>

</div>

<audio id="bgm" loop>
<source src="assets/audio/bgm.mp3"
type="audio/mpeg">
</audio>

<audio id="click">
<source src="assets/audio/click.mp3"
type="audio/mpeg">
</audio>

<div class="container">

<div class="topbar"
id="topbar">

<button class="xp-box"
onclick="goPage('leaderboard.html')">

<div class="xp-icon">
⭐
</div>

<div class="xp-info">

<div class="xp-label">
XP
</div>

<div class="xp-value"
id="xp">
0
</div>

</div>

</button>

<div class="profile"
onclick="goPage('settings.html')">

<img id="profilePic"
src="assets/images/default.png">

</div>

</div>

<div class="hero">

<h1 class="logo">
QuizRush
</h1>

<p class="subtitle">
Battle friends, challenge bots and become the quiz champion.
</p>

<img class="character"
src="assets/images/hero.png">

<div id="loginArea">

<div class="policy">

<input type="checkbox"
id="policyCheck">

<span>

I accept the
<a href="privacy.html">
Privacy Policy
</a>

</span>

</div>

<button class="login-btn"
id="loginBtn">

🚀 LOGIN WITH GOOGLE

</button>

</div>

</div>

<div class="grid"
id="menu">

<button class="card c1"
onclick="goPage('computer.html')">

<h2>
PLAY VS AI
</h2>

<p>
Train against smart bots and improve your quiz skills.
</p>

<img src="assets/images/ai.png">

</button>

<button class="card c2"
onclick="goPage('multiplayer.html')">

<h2>
MULTIPLAYER
</h2>

<p>
Battle real players online in live quiz matches.
</p>

<img src="assets/images/multiplayer.png">

</button>

<button class="card c3"
onclick="goPage('leaderboard.html')">

<h2>
LEADERBOARD
</h2>

<p>
Check world rankings and top players.
</p>

<img src="assets/images/trophy.png">

</button>

<button class="card c4"
onclick="goPage('friends.html')">

<h2>
FRIENDS
</h2>

<p>
Add friends and challenge them anytime.
</p>

<img src="assets/images/friends.png">

</button>

</div>

</div>

<div class="bottom-nav"
id="bottomNav">

<button class="nav-btn active"
onclick="goPage('index.html')">

<div class="nav-icon">
🏠
</div>

Home

</button>

<button class="nav-btn"
onclick="goPage('leaderboard.html')">

<div class="nav-icon">
🏆
</div>

Leaderboard

</button>

<button class="nav-btn"
onclick="goPage('friends.html')">

<div class="nav-icon">
👥
</div>

Friends

</button>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

GoogleAuthProvider,

signInWithPopup,

onAuthStateChanged

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

doc,

getDoc,

setDoc

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyB5KdyKgHVuvmKRhu-tQQKaBsbUH9-Pz-E",

authDomain:
"iodonium-r-ea28a.firebaseapp.com",

projectId:
"iodonium-r-ea28a",

storageBucket:
"iodonium-r-ea28a.firebasestorage.app",

messagingSenderId:
"556058248851",

appId:
"1:556058248851:web:132044a66f3095646c6f66",

measurementId:
"G-Y71J98XK25"
};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

const provider =
new GoogleAuthProvider();

const bgm =
document.getElementById("bgm");

const click =
document.getElementById("click");

bgm.volume = 0.45;

click.volume = 0.7;

function sound(){

    click.currentTime = 0;

    click.play()
    .catch(()=>{});
}

window.goPage = function(page){

    sound();

    if(!auth.currentUser){

        alert("Login Required");

        return;
    }

    setTimeout(()=>{

        window.location.href = page;

    },120);
};

function showUI(data){

    document
    .getElementById("topbar")
    .style.display =
    "flex";

    document
    .getElementById("menu")
    .style.display =
    "grid";

    document
    .getElementById("bottomNav")
    .style.display =
    "flex";

    document
    .getElementById("loginArea")
    .style.display =
    "none";

    document
    .getElementById("xp")
    .innerText =
    data.xp || 0;

    document
    .getElementById("profilePic")
    .src =
    data.photo ||
    auth.currentUser.photoURL ||
    "assets/images/default.png";
}

function hideUI(){

    document
    .getElementById("topbar")
    .style.display =
    "none";

    document
    .getElementById("menu")
    .style.display =
    "none";

    document
    .getElementById("bottomNav")
    .style.display =
    "none";

    document
    .getElementById("loginArea")
    .style.display =
    "block";
}

async function login(){

    sound();

    const accepted =
    document
    .getElementById("policyCheck")
    .checked;

    if(!accepted){

        alert(
        "Accept Privacy Policy"
        );

        return;
    }

    try{

        const result =
        await signInWithPopup(
        auth,
        provider
        );

        const user =
        result.user;

        const ref =
        doc(
        db,
        "users",
        user.uid
        );

        const snap =
        await getDoc(ref);

        if(!snap.exists()){

            await setDoc(ref,{

                name:
                user.displayName || "",

                photo:
                user.photoURL || "",

                xp:0,

                acceptedPolicy:true,

                createdAt:
                Date.now()
            });
        }

        const latest =
        await getDoc(ref);

        showUI(
        latest.data()
        );

        bgm.play()
        .catch(()=>{});

    }catch(error){

        alert(error.message);
    }
}

onAuthStateChanged(
auth,
async(user)=>{

    if(user){

        const ref =
        doc(
        db,
        "users",
        user.uid
        );

        const snap =
        await getDoc(ref);

        if(snap.exists()){

            showUI(
            snap.data()
            );

            bgm.play()
            .catch(()=>{});
        }

    }else{

        hideUI();
    }
});

document
.getElementById("loginBtn")
.onclick =
login;

document.body.addEventListener(
"click",
()=>{

    bgm.play()
    .catch(()=>{});

},{
once:true
});

document.body.addEventListener(
"touchstart",
()=>{

    bgm.play()
    .catch(()=>{});

},{
once:true
});

</script>

</body>
</html>
