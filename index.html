
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuizVerse</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{

    background:
    linear-gradient(
    180deg,
    #07111f,
    #0f172a,
    #111827
    );

    color:white;

    min-height:100vh;

    overflow-y:auto;
}

body::-webkit-scrollbar{
    width:0;
}

.bg{

    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
}

.glow{

    position:absolute;

    border-radius:50%;

    filter:blur(90px);

    opacity:0.28;
}

.glow1{

    width:260px;
    height:260px;

    background:#06b6d4;

    top:-40px;
    left:-40px;
}

.glow2{

    width:240px;
    height:240px;

    background:#3b82f6;

    right:-50px;
    top:25%;
}

.glow3{

    width:220px;
    height:220px;

    background:#8b5cf6;

    bottom:0;
    left:30%;
}

.container{

    position:relative;

    z-index:2;

    width:100%;

    padding:14px;
}

.topbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:18px;
}

.xp{

    background:
    rgba(255,255,255,0.08);

    border:
    1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    padding:12px 18px;

    border-radius:18px;

    font-size:18px;

    font-weight:600;

    box-shadow:
    0 8px 20px rgba(0,0,0,0.25);
}

.profile{

    width:64px;
    height:64px;

    border-radius:50%;

    overflow:hidden;

    border:3px solid #38bdf8;

    box-shadow:
    0 0 25px rgba(56,189,248,0.5);

    cursor:pointer;
}

.profile img{

    width:100%;
    height:100%;

    object-fit:cover;
}

.hero{

    margin-top:10px;

    margin-bottom:22px;
}

.title{

    font-size:42px;

    line-height:1.05;

    font-weight:700;

    background:
    linear-gradient(
    90deg,
    #38bdf8,
    #60a5fa,
    #818cf8
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.subtitle{

    margin-top:10px;

    color:#94a3b8;

    font-size:15px;

    line-height:1.5;
}

.login-btn{

    width:100%;

    margin-top:24px;

    border:none;

    background:
    linear-gradient(
    90deg,
    #06b6d4,
    #3b82f6
    );

    color:white;

    padding:18px;

    border-radius:22px;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

    box-shadow:
    0 12px 30px rgba(59,130,246,0.35);

    transition:0.25s;
}

.login-btn:active{

    transform:scale(0.97);
}

.grid{

    display:grid;

    grid-template-columns:1fr;

    gap:16px;

    margin-top:22px;

    padding-bottom:40px;
}

.card{

    position:relative;

    overflow:hidden;

    border:none;

    border-radius:28px;

    padding:22px;

    text-align:left;

    color:white;

    cursor:pointer;

    transition:0.25s;

    backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 15px 35px rgba(0,0,0,0.3);
}

.card:active{

    transform:scale(0.98);
}

.card::before{

    content:'';

    position:absolute;

    width:180px;
    height:180px;

    border-radius:50%;

    background:
    rgba(255,255,255,0.08);

    top:-70px;
    right:-70px;
}

.c1{
    background:
    linear-gradient(
    135deg,
    #0284c7,
    #38bdf8
    );
}

.c2{
    background:
    linear-gradient(
    135deg,
    #4338ca,
    #6366f1
    );
}

.c3{
    background:
    linear-gradient(
    135deg,
    #0f766e,
    #14b8a6
    );
}

.c4{
    background:
    linear-gradient(
    135deg,
    #1d4ed8,
    #2563eb
    );
}

.icon{

    font-size:52px;

    position:relative;

    z-index:2;
}

.card h2{

    margin-top:14px;

    font-size:24px;

    position:relative;

    z-index:2;
}

.card p{

    margin-top:8px;

    color:
    rgba(255,255,255,0.9);

    font-size:14px;

    line-height:1.5;

    position:relative;

    z-index:2;
}

.music{

    position:fixed;

    right:16px;
    bottom:16px;

    width:62px;
    height:62px;

    border:none;

    border-radius:50%;

    background:
    linear-gradient(
    135deg,
    #0ea5e9,
    #2563eb
    );

    color:white;

    font-size:24px;

    cursor:pointer;

    z-index:10;

    box-shadow:
    0 12px 30px rgba(59,130,246,0.4);
}

.hidden{
    display:none;
}

@media(min-width:700px){

    .container{

        max-width:700px;

        margin:auto;

        padding-top:25px;
    }

    .title{
        font-size:60px;
    }

    .grid{

        grid-template-columns:
        repeat(2,1fr);
    }
}

</style>
</head>

<body>

<div class="bg">

<div class="glow glow1"></div>
<div class="glow glow2"></div>
<div class="glow glow3"></div>

</div>

<audio id="bgm" loop>
<source src="bgm.mp3"
type="audio/mpeg">
</audio>

<audio id="click">
<source src="click.mp3"
type="audio/mpeg">
</audio>

<div class="container">

<div class="topbar">

<div class="xp">
⭐ XP:
<span id="xp">0</span>
</div>

<div class="profile"
onclick="goPage('settings.html')">

<img id="profilePic"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

</div>

</div>

<div class="hero">

<h1 class="title">
QuizVerse
</h1>

<p class="subtitle">
Multiplayer flag, country and currency battle experience.
</p>

<button class="login-btn"
id="loginBtn">

Login With Google

</button>

</div>

<div class="grid hidden"
id="menu">

<button class="card c1"
onclick="goPage('computer.html')">

<div class="icon">
🤖
</div>

<h2>
Play vs AI
</h2>

<p>
Practice quiz battles against smart bots.
</p>

</button>

<button class="card c2"
onclick="goPage('multiplayer.html')">

<div class="icon">
👥
</div>

<h2>
Multiplayer
</h2>

<p>
Compete with real players online.
</p>

</button>

<button class="card c3"
onclick="goPage('leaderboard.html')">

<div class="icon">
🏆
</div>

<h2>
Leaderboard
</h2>

<p>
Track rankings and top players.
</p>

</button>

<button class="card c4"
onclick="goPage('settings.html')">

<div class="icon">
⚙️
</div>

<h2>
Settings
</h2>

<p>
Manage sound, account and profile.
</p>

</button>

</div>

</div>

<button class="music"
onclick="toggleMusic()">

🎵

</button>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

GoogleAuthProvider,

signInWithPopup,

onAuthStateChanged

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

doc,

getDoc,

setDoc

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyB5KdyKgHVuvmKRhu-tQQKaBsbUH9-Pz-E",

authDomain:
"iodonium-r-ea28a.firebaseapp.com",

projectId:
"iodonium-r-ea28a",

storageBucket:
"iodonium-r-ea28a.firebasestorage.app",

messagingSenderId:
"556058248851",

appId:
"1:556058248851:web:132044a66f3095646c6f66"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

const provider =
new GoogleAuthProvider();

const bgm =
document.getElementById("bgm");

const click =
document.getElementById("click");

function sound(){

click.currentTime = 0;

click.play();
}

window.goPage = function(page){

sound();

setTimeout(()=>{

window.location.href = page;

},120);
};

window.toggleMusic = function(){

sound();

if(bgm.paused){

bgm.play();

}else{

bgm.pause();
}
};

async function login(){

try{

const result =
await signInWithPopup(
auth,
provider
);

const user =
result.user;

const ref =
doc(
db,
"users",
user.uid
);

const snap =
await getDoc(ref);

if(!snap.exists()){

await setDoc(ref,{

name:
user.displayName,

photo:
user.photoURL,

xp:0,

createdAt:
Date.now()

});
}

const latest =
await getDoc(ref);

const data =
latest.data();

document
.getElementById("profilePic")
.src =
user.photoURL;

document
.getElementById("xp")
.innerText =
data.xp || 0;

document
.getElementById("menu")
.classList.remove("hidden");

document
.getElementById("loginBtn")
.classList.add("hidden");

}catch(error){

alert(error.message);

console.log(error);
}
}

onAuthStateChanged(
auth,
async(user)=>{

if(user){

const ref =
doc(
db,
"users",
user.uid
);

const snap =
await getDoc(ref);

if(snap.exists()){

const data =
snap.data();

document
.getElementById("profilePic")
.src =
user.photoURL;

document
.getElementById("xp")
.innerText =
data.xp || 0;

document
.getElementById("menu")
.classList.remove("hidden");

document
.getElementById("loginBtn")
.classList.add("hidden");
}
}
});

document
.getElementById("loginBtn")
.onclick = login;

document.addEventListener(
"click",
()=>{

bgm.play()
.catch(()=>{});

},{
once:true
});

</script>

</body>
</html>
