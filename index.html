<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuizRush</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Baloo 2',cursive;
    -webkit-tap-highlight-color:transparent;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    background:
    linear-gradient(
    180deg,
    #190b38,
    #111827,
    #09111f
    );

    color:white;
}

/* BACKGROUND */

.bg{

    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
}

.blur{

    position:absolute;

    border-radius:50%;

    filter:blur(120px);

    opacity:0.55;

    animation:float 8s ease-in-out infinite;
}

.b1{

    width:320px;
    height:320px;

    background:#8b5cf6;

    top:-120px;
    left:-120px;
}

.b2{

    width:340px;
    height:340px;

    background:#06b6d4;

    right:-140px;
    top:18%;
}

.b3{

    width:280px;
    height:280px;

    background:#ec4899;

    bottom:-100px;
    left:-90px;
}

.b4{

    width:240px;
    height:240px;

    background:#22c55e;

    right:-90px;
    bottom:10%;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-20px);
    }

    100%{
        transform:translateY(0px);
    }
}

.stars{

    position:absolute;
    inset:0;

    background-image:
    radial-gradient(
    rgba(255,255,255,0.9) 1px,
    transparent 1px
    );

    background-size:40px 40px;

    opacity:0.15;
}

/* CONTAINER */

.container{

    position:relative;

    z-index:2;

    width:100%;

    padding:16px 16px 120px;
}

/* TOPBAR */

.topbar{

    display:none;

    justify-content:space-between;

    align-items:center;

    margin-bottom:24px;

    animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(-15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.xp-box{

    border:none;

    display:flex;

    align-items:center;

    gap:10px;

    padding:10px 16px;

    border-radius:22px;

    cursor:pointer;

    background:
    rgba(255,255,255,0.12);

    backdrop-filter:blur(16px);

    border:
    2px solid rgba(255,255,255,0.08);

    box-shadow:
    0 10px 30px rgba(0,0,0,0.3);
}

.xp-icon{

    width:34px;
    height:34px;

    border-radius:12px;

    display:flex;

    align-items:center;

    justify-content:center;

    background:
    linear-gradient(
    135deg,
    #facc15,
    #fb7185
    );

    font-size:16px;
}

.xp-info{

    display:flex;

    flex-direction:column;
}

.xp-label{

    font-size:10px;

    color:#cbd5e1;

    line-height:1;
}

.xp-value{

    font-size:18px;

    font-weight:800;

    line-height:1;
}

.profile{

    width:56px;
    height:56px;

    border-radius:50%;

    overflow:hidden;

    border:3px solid #67e8f9;

    box-shadow:
    0 0 25px rgba(103,232,249,0.6);

    animation:pulse 2s infinite;
}

.profile img{

    width:100%;
    height:100%;

    object-fit:cover;
}

@keyframes pulse{

    0%{
        box-shadow:0 0 10px rgba(103,232,249,0.4);
    }

    50%{
        box-shadow:0 0 30px rgba(103,232,249,0.8);
    }

    100%{
        box-shadow:0 0 10px rgba(103,232,249,0.4);
    }
}

/* HERO */

.hero{

    text-align:center;

    margin-top:10px;
}

.logo{

    font-size:62px;

    font-weight:800;

    line-height:1;

    background:
    linear-gradient(
    90deg,
    #38bdf8,
    #a855f7,
    #ec4899
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    animation:bounce 2s infinite;
}

@keyframes bounce{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-6px);
    }
}

.subtitle{

    margin-top:10px;

    font-size:17px;

    line-height:1.5;

    color:#dbeafe;
}

.character{

    width:220px;

    margin-top:20px;

    animation:floatChar 3s ease-in-out infinite;
}

@keyframes floatChar{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-12px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* LOGIN */

.login-btn{

    width:100%;

    margin-top:24px;

    border:none;

    outline:none;

    padding:18px;

    border-radius:28px;

    font-size:18px;

    font-weight:800;

    color:white;

    cursor:pointer;

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );

    box-shadow:
    0 15px 40px rgba(139,92,246,0.4);

    transition:0.2s;
}

.login-btn:active{

    transform:scale(0.97);
}

/* MENU */

.grid{

    display:none;

    grid-template-columns:1fr;

    gap:20px;

    margin-top:26px;
}

.card{

    position:relative;

    overflow:hidden;

    border:none;

    border-radius:34px;

    padding:24px;

    min-height:220px;

    text-align:left;

    color:white;

    cursor:pointer;

    transition:0.2s;

    border:
    2px solid rgba(255,255,255,0.08);

    box-shadow:
    0 18px 40px rgba(0,0,0,0.35);

    animation:cardPop 0.4s ease;
}

@keyframes cardPop{

    from{
        opacity:0;
        transform:scale(0.9);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

.card:active{

    transform:scale(0.98);
}

.card::before{

    content:'';

    position:absolute;

    width:180px;
    height:180px;

    border-radius:50%;

    background:
    rgba(255,255,255,0.15);

    top:-70px;
    right:-70px;
}

.card img{

    width:110px;

    position:absolute;

    right:10px;
    bottom:10px;

    filter:
    drop-shadow(
    0 8px 20px rgba(0,0,0,0.3)
    );
}

.card h2{

    font-size:28px;

    line-height:1.1;

    position:relative;

    z-index:2;
}

.card p{

    margin-top:10px;

    font-size:15px;

    line-height:1.5;

    color:
    rgba(255,255,255,0.92);

    max-width:180px;

    position:relative;

    z-index:2;
}

.c1{

    background:
    linear-gradient(
    135deg,
    #0ea5e9,
    #14b8a6
    );
}

.c2{

    background:
    linear-gradient(
    135deg,
    #8b5cf6,
    #ec4899
    );
}

.c3{

    background:
    linear-gradient(
    135deg,
    #f59e0b,
    #facc15
    );

    color:#4a2b00;
}

.c3 p{
    color:#5f3700;
}

.c4{

    background:
    linear-gradient(
    135deg,
    #2563eb,
    #06b6d4
    );
}

/* NAVBAR */

.bottom-nav{

    position:fixed;

    left:0;
    right:0;
    bottom:0;

    z-index:100;

    display:none;

    justify-content:space-around;

    align-items:center;

    padding:12px 10px calc(12px + env(safe-area-inset-bottom));

    background:
    rgba(11,18,32,0.88);

    backdrop-filter:blur(20px);

    border-top:
    1px solid rgba(255,255,255,0.08);
}

.nav-btn{

    border:none;

    background:none;

    color:white;

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:5px;

    font-size:12px;

    font-weight:700;

    cursor:pointer;
}

.nav-icon{

    width:50px;
    height:50px;

    border-radius:16px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:22px;

    background:
    rgba(255,255,255,0.08);
}

.active .nav-icon{

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );

    box-shadow:
    0 10px 25px rgba(139,92,246,0.4);
}

@media(min-width:700px){

    .container{

        max-width:760px;

        margin:auto;
    }

    .grid{

        grid-template-columns:
        repeat(2,1fr);
    }

    .logo{
        font-size:82px;
    }
}

</style>
</head>

<body>

<div class="bg">

<div class="blur b1"></div>
<div class="blur b2"></div>
<div class="blur b3"></div>
<div class="blur b4"></div>

<div class="stars"></div>

</div>

<!-- AUDIO -->

<audio id="bgm" loop autoplay>
<source src="assets/audio/bgm.mp3"
type="audio/mpeg">
</audio>

<audio id="click">
<source src="assets/audio/click.mp3"
type="audio/mpeg">
</audio>

<div class="container">

<!-- TOPBAR -->

<div class="topbar"
id="topbar">

<button class="xp-box"
onclick="goPage('leaderboard.html')">

<div class="xp-icon">
⭐
</div>

<div class="xp-info">

<div class="xp-label">
XP
</div>

<div class="xp-value"
id="xp">
0
</div>

</div>

</button>

<div class="profile"
onclick="goPage('settings.html')">

<img id="profilePic"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

</div>

</div>

<!-- HERO -->

<div class="hero">

<h1 class="logo">
QuizRush
</h1>

<p class="subtitle">
Battle friends, challenge bots and become the quiz champion.
</p>

<img class="character"
src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

<button class="login-btn"
id="loginBtn">

🚀 LOGIN WITH GOOGLE

</button>

</div>

<!-- GRID -->

<div class="grid"
id="menu">

<button class="card c1"
onclick="goPage('computer.html')">

<h2>
PLAY VS AI
</h2>

<p>
Train against smart bots and improve your skills.
</p>

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">

</button>

<button class="card c2"
onclick="goPage('multiplayer.html')">

<h2>
MULTIPLAYER
</h2>

<p>
Compete online against real players live.
</p>

<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

</button>

<button class="card c3"
onclick="goPage('leaderboard.html')">

<h2>
LEADERBOARD
</h2>

<p>
See top global players and rankings.
</p>

<img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png">

</button>

<button class="card c4"
onclick="goPage('friends.html')">

<h2>
FRIENDS
</h2>

<p>
Add friends and challenge them to battles.
</p>

<img src="https://cdn-icons-png.flaticon.com/512/681/681494.png">

</button>

</div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav"
id="bottomNav">

<button class="nav-btn active"
onclick="goPage('dashboard.html')">

<div class="nav-icon">
🏠
</div>

Home

</button>

<button class="nav-btn"
onclick="goPage('leaderboard.html')">

<div class="nav-icon">
🏆
</div>

Leaderboard

</button>

<button class="nav-btn"
onclick="goPage('friends.html')">

<div class="nav-icon">
👥
</div>

Friends

</button>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import { getAnalytics }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";

import {

getAuth,

GoogleAuthProvider,

signInWithPopup,

onAuthStateChanged

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

doc,

getDoc,

setDoc

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyB5KdyKgHVuvmKRhu-tQQKaBsbUH9-Pz-E",

authDomain:
"iodonium-r-ea28a.firebaseapp.com",

projectId:
"iodonium-r-ea28a",

storageBucket:
"iodonium-r-ea28a.firebasestorage.app",

messagingSenderId:
"556058248851",

appId:
"1:556058248851:web:132044a66f3095646c6f66",

measurementId:
"G-Y71J98XK25"

};

const app =
initializeApp(firebaseConfig);

getAnalytics(app);

const auth =
getAuth(app);

const db =
getFirestore(app);

const provider =
new GoogleAuthProvider();

const bgm =
document.getElementById("bgm");

const click =
document.getElementById("click");

bgm.volume = 1;

click.volume = 0.7;

/* SOUNDS */

function playClick(){

    click.currentTime = 0;

    click.play()
    .catch(()=>{});
}

/* NAVIGATION */

window.goPage = function(page){

    playClick();

    const user =
    auth.currentUser;

    if(!user){

        alert("Login first");

        return;
    }

    setTimeout(()=>{

        window.location.href = page;

    },150);
};

/* SHOW UI */

function showUI(user,data){

    document
    .getElementById("topbar")
    .style.display =
    "flex";

    document
    .getElementById("menu")
    .style.display =
    "grid";

    document
    .getElementById("bottomNav")
    .style.display =
    "flex";

    document
    .getElementById("loginBtn")
    .style.display =
    "none";

    document
    .getElementById("profilePic")
    .src =
    user.photoURL;

    document
    .getElementById("xp")
    .innerText =
    data.xp || 0;
}

/* HIDE UI */

function hideUI(){

    document
    .getElementById("topbar")
    .style.display =
    "none";

    document
    .getElementById("menu")
    .style.display =
    "none";

    document
    .getElementById("bottomNav")
    .style.display =
    "none";

    document
    .getElementById("loginBtn")
    .style.display =
    "block";
}

/* LOGIN */

async function login(){

    playClick();

    try{

        const result =
        await signInWithPopup(
        auth,
        provider
        );

        const user =
        result.user;

        const ref =
        doc(
        db,
        "users",
        user.uid
        );

        const snap =
        await getDoc(ref);

        if(!snap.exists()){

            await setDoc(ref,{

                name:
                user.displayName,

                photo:
                user.photoURL,

                xp:0,

                createdAt:
                Date.now()

            });
        }

        const latest =
        await getDoc(ref);

        const data =
        latest.data();

        showUI(user,data);

        bgm.play()
        .catch(()=>{});

    }catch(error){

        alert(error.message);

        console.log(error);
    }
}

/* AUTH */

onAuthStateChanged(
auth,
async(user)=>{

    if(user){

        const ref =
        doc(
        db,
        "users",
        user.uid
        );

        const snap =
        await getDoc(ref);

        if(snap.exists()){

            showUI(
            user,
            snap.data()
            );

            bgm.play()
            .catch(()=>{});
        }

    }else{

        hideUI();
    }
});

document
.getElementById("loginBtn")
.onclick =
login;

/* ENABLE AUDIO */

document.body.addEventListener(
"touchstart",
()=>{

    bgm.play()
    .catch(()=>{});

},{
once:true
});

document.body.addEventListener(
"click",
()=>{

    bgm.play()
    .catch(()=>{});

},{
once:true
});

</script>

</body>
</html>
