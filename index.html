<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuizRush Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Baloo 2',cursive;
    -webkit-tap-highlight-color:transparent;
}

body{

    min-height:100vh;
    overflow-x:hidden;
    background:
    linear-gradient(
    180deg,
    #17072f,
    #101827,
    #07111d
    );

    color:white;
}

/* BG */

.bg{

    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
}

.blur{

    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    opacity:.55;
    animation:float 7s ease-in-out infinite;
}

.b1{
    width:320px;
    height:320px;
    background:#8b5cf6;
    top:-100px;
    left:-100px;
}

.b2{
    width:320px;
    height:320px;
    background:#06b6d4;
    top:20%;
    right:-120px;
}

.b3{
    width:250px;
    height:250px;
    background:#ec4899;
    bottom:-80px;
    left:-80px;
}

.b4{
    width:220px;
    height:220px;
    background:#22c55e;
    bottom:10%;
    right:-80px;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-18px);
    }

    100%{
        transform:translateY(0px);
    }
}

.stars{

    position:absolute;
    inset:0;

    background-image:
    radial-gradient(
    rgba(255,255,255,.9) 1px,
    transparent 1px
    );

    background-size:38px 38px;
    opacity:.12;
}

/* CONTAINER */

.container{

    position:relative;
    z-index:2;
    width:100%;
    padding:18px 18px 140px;
}

/* TOPBAR */

.topbar{

    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:26px;
}

.xp-box{

    display:flex;
    align-items:center;
    gap:10px;

    border:none;
    cursor:pointer;

    padding:10px 14px;

    border-radius:22px;

    background:
    rgba(255,255,255,.09);

    backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,.08);

    box-shadow:
    0 12px 30px rgba(0,0,0,.3);
}

.xp-icon{

    width:34px;
    height:34px;

    border-radius:12px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
    linear-gradient(
    135deg,
    #facc15,
    #fb7185
    );

    font-size:15px;
}

.xp-info{

    display:flex;
    flex-direction:column;
}

.xp-label{

    font-size:10px;
    color:#cbd5e1;
    line-height:1;
}

.xp-value{

    font-size:18px;
    font-weight:800;
    line-height:1;
}

.profile{

    width:52px;
    height:52px;

    border-radius:50%;
    overflow:hidden;

    border:3px solid #67e8f9;

    box-shadow:
    0 0 25px rgba(103,232,249,.5);

    cursor:pointer;
}

.profile img{

    width:100%;
    height:100%;
    object-fit:cover;
}

/* HERO */

.hero{

    text-align:center;
}

.logo{

    font-size:58px;
    font-weight:800;
    line-height:1;

    background:
    linear-gradient(
    90deg,
    #38bdf8,
    #a855f7,
    #ec4899
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{

    margin-top:10px;

    font-size:16px;
    line-height:1.5;

    color:#dbeafe;
}

.hero-img{

    width:220px;
    margin-top:20px;

    animation:heroFloat 3s ease-in-out infinite;
}

@keyframes heroFloat{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-12px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* GRID */

.grid{

    margin-top:28px;

    display:grid;
    gap:18px;
}

.card{

    position:relative;

    overflow:hidden;

    border:none;
    cursor:pointer;

    border-radius:34px;

    min-height:205px;

    padding:24px;

    text-align:left;

    color:white;

    border:
    1px solid rgba(255,255,255,.08);

    box-shadow:
    0 20px 40px rgba(0,0,0,.35);

    transition:.2s;
}

.card:active{

    transform:scale(.98);
}

.card::before{

    content:'';

    position:absolute;

    width:180px;
    height:180px;

    border-radius:50%;

    background:
    rgba(255,255,255,.12);

    top:-70px;
    right:-70px;
}

.card h2{

    position:relative;
    z-index:2;

    font-size:28px;
    line-height:1.1;
}

.card p{

    position:relative;
    z-index:2;

    margin-top:10px;

    font-size:15px;
    line-height:1.5;

    max-width:180px;

    color:
    rgba(255,255,255,.9);
}

.card img{

    width:110px;

    position:absolute;

    right:10px;
    bottom:8px;

    filter:
    drop-shadow(
    0 10px 20px rgba(0,0,0,.35)
    );
}

.c1{
    background:
    linear-gradient(
    135deg,
    #0ea5e9,
    #14b8a6
    );
}

.c2{
    background:
    linear-gradient(
    135deg,
    #8b5cf6,
    #ec4899
    );
}

.c3{
    background:
    linear-gradient(
    135deg,
    #f59e0b,
    #facc15
    );

    color:#542f00;
}

.c3 p{
    color:#5b3900;
}

.c4{
    background:
    linear-gradient(
    135deg,
    #2563eb,
    #06b6d4
    );
}

/* NAV */

.bottom-nav{

    position:fixed;

    left:14px;
    right:14px;
    bottom:16px;

    z-index:100;

    height:78px;

    border-radius:28px;

    display:flex;
    align-items:center;
    justify-content:space-around;

    background:
    rgba(8,15,27,.72);

    backdrop-filter:blur(24px);

    border:
    1px solid rgba(255,255,255,.08);

    box-shadow:
    0 20px 40px rgba(0,0,0,.45);
}

.nav-btn{

    border:none;
    background:none;

    color:white;

    display:flex;
    flex-direction:column;
    align-items:center;

    gap:4px;

    cursor:pointer;

    font-size:12px;
    font-weight:700;
}

.nav-icon{

    width:48px;
    height:48px;

    border-radius:16px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:21px;

    background:
    rgba(255,255,255,.08);
}

.active .nav-icon{

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );

    box-shadow:
    0 10px 25px rgba(139,92,246,.4);
}

/* LOGIN */

.login-box{

    margin-top:26px;

    padding:24px;

    border-radius:34px;

    background:
    rgba(255,255,255,.08);

    border:
    1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(18px);
}

.check{

    display:flex;
    align-items:flex-start;
    gap:12px;

    margin-top:18px;
}

.check input{

    margin-top:5px;

    width:18px;
    height:18px;
}

.check label{

    font-size:14px;
    line-height:1.5;

    color:#dbeafe;
}

.check a{

    color:#67e8f9;
    text-decoration:none;
}

.login-btn{

    width:100%;

    margin-top:18px;

    border:none;
    outline:none;

    padding:18px;

    border-radius:28px;

    font-size:18px;
    font-weight:800;

    color:white;

    cursor:pointer;

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );

    box-shadow:
    0 15px 35px rgba(139,92,246,.4);
}

@media(min-width:700px){

    .container{
        max-width:760px;
        margin:auto;
    }

    .grid{
        grid-template-columns:repeat(2,1fr);
    }
}

</style>
</head>

<body>

<div class="bg">

<div class="blur b1"></div>
<div class="blur b2"></div>
<div class="blur b3"></div>
<div class="blur b4"></div>

<div class="stars"></div>

</div>

<audio id="bgm" loop>
<source src="assets/audio/bgm.mp3" type="audio/mpeg">
</audio>

<audio id="click">
<source src="assets/audio/click.mp3" type="audio/mpeg">
</audio>

<div class="container">

<!-- TOP -->

<div class="topbar">

<button class="xp-box" onclick="goPage('leaderboard.html')">

<div class="xp-icon">
⭐
</div>

<div class="xp-info">

<div class="xp-label">
XP
</div>

<div class="xp-value" id="xp">
0
</div>

</div>

</button>

<div class="profile" onclick="goPage('settings.html')">

<img id="profilePic"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

</div>

</div>

<!-- HERO -->

<div class="hero">

<h1 class="logo">
QuizRush
</h1>

<p class="subtitle">
Battle friends, challenge bots and become quiz champion.
</p>

<img class="hero-img"
src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

</div>

<!-- LOGIN -->

<div class="login-box" id="loginBox">

<div class="check">

<input type="checkbox" id="policy">

<label for="policy">

I agree to the
<a href="privacy.html">
Privacy Policy
</a>

</label>

</div>

<button class="login-btn" id="loginBtn">

🚀 LOGIN WITH GOOGLE

</button>

</div>

<!-- MENU -->

<div class="grid">

<button class="card c1"
onclick="goPage('computer.html')">

<h2>
PLAY VS AI
</h2>

<p>
Train against smart quiz bots and improve skills.
</p>

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">

</button>

<button class="card c2"
onclick="goPage('multiplayer.html')">

<h2>
MULTIPLAYER
</h2>

<p>
Battle real online players in live matches.
</p>

<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

</button>

<button class="card c3"
onclick="goPage('leaderboard.html')">

<h2>
LEADERBOARD
</h2>

<p>
See top players and global rankings.
</p>

<img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png">

</button>

<button class="card c4"
onclick="goPage('friends.html')">

<h2>
FRIENDS
</h2>

<p>
Add friends and challenge them to quiz battles.
</p>

<img src="https://cdn-icons-png.flaticon.com/512/681/681494.png">

</button>

</div>

</div>

<!-- NAV -->

<div class="bottom-nav">

<button class="nav-btn active"
onclick="goPage('dashboard.html')">

<div class="nav-icon">
🏠
</div>

Home

</button>

<button class="nav-btn"
onclick="goPage('leaderboard.html')">

<div class="nav-icon">
🏆
</div>

Leaderboard

</button>

<button class="nav-btn"
onclick="goPage('friends.html')">

<div class="nav-icon">
👥
</div>

Friends

</button>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,

GoogleAuthProvider,

signInWithPopup,

onAuthStateChanged

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

doc,

getDoc,

setDoc

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyB5KdyKgHVuvmKRhu-tQQKaBsbUH9-Pz-E",

authDomain:
"iodonium-r-ea28a.firebaseapp.com",

projectId:
"iodonium-r-ea28a",

storageBucket:
"iodonium-r-ea28a.firebasestorage.app",

messagingSenderId:
"556058248851",

appId:
"1:556058248851:web:132044a66f3095646c6f66"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

const provider =
new GoogleAuthProvider();

const bgm =
document.getElementById("bgm");

const click =
document.getElementById("click");

bgm.volume = 0.4;

click.volume = 0.7;

/* AUDIO */

function startMusic(){

    bgm.play()
    .catch(()=>{});
}

document.body.addEventListener(
"click",
startMusic,
{ once:true }
);

function sound(){

    click.currentTime = 0;

    click.play()
    .catch(()=>{});
}

/* NAV */

window.goPage = function(page){

    sound();

    setTimeout(()=>{

        window.location.href = page;

    },150);
};

/* LOGIN */

document
.getElementById("loginBtn")
.onclick =
async function(){

    sound();

    const checked =
    document
    .getElementById("policy")
    .checked;

    if(!checked){

        alert(
        "Accept Privacy Policy first"
        );

        return;
    }

    try{

        const result =
        await signInWithPopup(
        auth,
        provider
        );

        const user =
        result.user;

        const ref =
        doc(
        db,
        "users",
        user.uid
        );

        const snap =
        await getDoc(ref);

        if(!snap.exists()){

            await setDoc(ref,{

                name:
                user.displayName || "Player",

                photo:
                user.photoURL ||
                "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",

                xp:0,

                privacyAccepted:true,

                createdAt:
                Date.now()

            });
        }

        location.reload();

    }catch(error){

        alert(error.message);
    }
};

/* LOAD */

onAuthStateChanged(
auth,
async(user)=>{

    if(!user)return;

    const ref =
    doc(
    db,
    "users",
    user.uid
    );

    const snap =
    await getDoc(ref);

    if(snap.exists()){

        const data =
        snap.data();

        document
        .getElementById("xp")
        .innerText =
        data.xp || 0;

        document
        .getElementById("profilePic")
        .src =
        data.photo ||
        "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
    }
});

</script>

</body>
</html>
