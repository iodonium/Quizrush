<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QuizRush</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    background:
    linear-gradient(
    180deg,
    #090b1a,
    #111827,
    #0f172a
    );

    color:white;
}

body::-webkit-scrollbar{
    width:0;
}

.bg{

    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
}

.glow{

    position:absolute;

    border-radius:50%;

    filter:blur(110px);

    opacity:0.5;
}

.g1{

    width:300px;
    height:300px;

    background:#8b5cf6;

    top:-120px;
    left:-100px;
}

.g2{

    width:350px;
    height:350px;

    background:#06b6d4;

    right:-120px;
    top:20%;
}

.g3{

    width:280px;
    height:280px;

    background:#ec4899;

    bottom:-80px;
    left:-100px;
}

.g4{

    width:260px;
    height:260px;

    background:#3b82f6;

    bottom:10%;
    right:-90px;
}

.stars{

    position:absolute;
    inset:0;

    background-image:
    radial-gradient(
    rgba(255,255,255,0.9) 1px,
    transparent 1px
    );

    background-size:35px 35px;

    opacity:0.18;
}

.container{

    position:relative;

    z-index:2;

    width:100%;

    padding:18px 18px 120px;
}

.topbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:28px;
}

.xp{

    display:flex;

    align-items:center;

    gap:10px;

    padding:12px 18px;

    border-radius:24px;

    background:
    rgba(255,255,255,0.1);

    backdrop-filter:blur(15px);

    border:
    1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 10px 30px rgba(0,0,0,0.3);
}

.star{

    width:38px;
    height:38px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    background:
    linear-gradient(
    135deg,
    #f59e0b,
    #facc15
    );

    color:#111827;

    font-size:20px;

    box-shadow:
    0 0 20px rgba(250,204,21,0.4);
}

.xp-text{

    font-size:22px;

    font-weight:800;

    color:white;
}

.profile{

    width:74px;
    height:74px;

    border-radius:50%;

    overflow:hidden;

    border:4px solid #67e8f9;

    box-shadow:
    0 0 28px rgba(103,232,249,0.6);

    cursor:pointer;
}

.profile img{

    width:100%;
    height:100%;

    object-fit:cover;
}

.hero{

    margin-bottom:24px;
}

.logo{

    font-size:62px;

    font-weight:800;

    line-height:1;

    letter-spacing:-2px;

    background:
    linear-gradient(
    90deg,
    #ff6b6b,
    #f59e0b,
    #22c55e,
    #38bdf8,
    #8b5cf6,
    #ec4899
    );

    background-size:400% 400%;

    animation:move 8s ease infinite;

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

@keyframes move{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

.subtitle{

    margin-top:14px;

    font-size:18px;

    line-height:1.7;

    color:rgba(255,255,255,0.88);
}

.login-btn{

    width:100%;

    margin-top:24px;

    border:none;

    outline:none;

    padding:18px;

    border-radius:26px;

    font-size:18px;

    font-weight:700;

    color:white;

    cursor:pointer;

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );

    box-shadow:
    0 14px 35px rgba(139,92,246,0.4);

    transition:0.2s;
}

.login-btn:active{
    transform:scale(0.98);
}

.grid{

    display:grid;

    grid-template-columns:1fr;

    gap:24px;
}

.card{

    position:relative;

    overflow:hidden;

    border:none;

    border-radius:38px;

    padding:26px;

    min-height:240px;

    text-align:left;

    cursor:pointer;

    transition:0.2s;

    border:
    1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 18px 40px rgba(0,0,0,0.35);
}

.card:active{
    transform:scale(0.985);
}

.card::before{

    content:'';

    position:absolute;

    width:220px;
    height:220px;

    border-radius:50%;

    background:
    rgba(255,255,255,0.12);

    top:-80px;
    right:-60px;
}

.card img{

    width:100px;

    position:relative;

    z-index:2;

    filter:
    drop-shadow(
    0 10px 18px rgba(0,0,0,0.35)
    );
}

.float-right{

    position:absolute;

    right:16px;
    top:16px;

    width:120px !important;
}

.card h2{

    margin-top:24px;

    font-size:28px;

    line-height:1.2;

    font-weight:800;

    position:relative;

    z-index:2;

    text-shadow:
    0 5px 10px rgba(0,0,0,0.4);
}

.card p{

    margin-top:12px;

    font-size:16px;

    line-height:1.6;

    color:
    rgba(255,255,255,0.92);

    position:relative;

    z-index:2;
}

.c1{

    background:
    linear-gradient(
    135deg,
    #1d9bf0,
    #34d399
    );
}

.c2{

    background:
    linear-gradient(
    135deg,
    #9333ea,
    #ec4899
    );
}

.c3{

    background:
    linear-gradient(
    135deg,
    #f59e0b,
    #fde047
    );

    color:#4a2500;
}

.c3 p{
    color:#5f3700;
}

.c4{

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #2563eb
    );
}

.hidden{
    display:none;
}

.bottom-nav{

    position:fixed;

    left:0;
    right:0;
    bottom:0;

    z-index:100;

    display:flex;

    justify-content:space-around;

    align-items:center;

    padding:14px 10px calc(14px + env(safe-area-inset-bottom));

    background:
    rgba(8,15,30,0.82);

    backdrop-filter:blur(20px);

    border-top:
    1px solid rgba(255,255,255,0.1);
}

.nav-btn{

    border:none;

    background:none;

    color:white;

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:6px;

    font-size:13px;

    font-weight:600;

    cursor:pointer;

    opacity:0.78;
}

.nav-btn.active{
    opacity:1;
}

.nav-icon{

    width:52px;
    height:52px;

    border-radius:18px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:24px;

    background:
    rgba(255,255,255,0.08);

    border:
    1px solid rgba(255,255,255,0.08);
}

.active .nav-icon{

    background:
    linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );

    box-shadow:
    0 10px 25px rgba(139,92,246,0.35);
}

.footer-space{
    height:30px;
}

@media(min-width:700px){

    .container{

        max-width:760px;

        margin:auto;
    }

    .grid{

        grid-template-columns:
        repeat(2,1fr);
    }

    .logo{
        font-size:82px;
    }
}

</style>
</head>

<body>

<div class="bg">

<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="glow g3"></div>
<div class="glow g4"></div>

<div class="stars"></div>

</div>

<audio id="bgm" loop>
<source src="bgm.mp3"
type="audio/mpeg">
</audio>

<audio id="click">
<source src="click.mp3"
type="audio/mpeg">
</audio>

<div class="container">

<div class="topbar">

<div class="xp">

<div class="star">
⭐
</div>

<div class="xp-text">
XP: <span id="xp">0</span>
</div>

</div>

<div class="profile"
onclick="goPage('settings.html')">

<img id="profilePic"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

</div>

</div>

<div class="hero">

<h1 class="logo">
QuizRush
</h1>

<p class="subtitle">
Multiplayer flag, country and currency battle experience for kids.
</p>

<button class="login-btn"
id="loginBtn">

🚀 Login With Google

</button>

</div>

<div class="grid hidden"
id="menu">

<button class="card c1"
onclick="goPage('computer.html')">

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

<img class="float-right"
src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">

<h2>
PLAY VS BOT-PAL
</h2>

<p>
Play quiz battles against friendly bots.
</p>

</button>

<button class="card c2"
onclick="goPage('multiplayer.html')">

<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

<img class="float-right"
src="https://cdn-icons-png.flaticon.com/512/706/706830.png">

<h2>
MULTIPLAYER PARTY
</h2>

<p>
Compete with friends online for fun prizes.
</p>

</button>

<button class="card c3"
onclick="goPage('leaderboard.html')">

<img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png">

<h2>
LEADERBOARDS
</h2>

<p>
See top players and global rankings.
</p>

</button>

<button class="card c4"
onclick="goPage('friends.html')">

<img src="https://cdn-icons-png.flaticon.com/512/681/681494.png">

<h2>
FRIENDS
</h2>

<p>
Add friends and challenge them online.
</p>

</button>

</div>

<div class="footer-space"></div>

</div>

<div class="bottom-nav">

<button class="nav-btn active"
onclick="goPage('dashboard.html')">

<div class="nav-icon">
🏠
</div>

Home

</button>

<button class="nav-btn"
onclick="goPage('leaderboard.html')">

<div class="nav-icon">
🏆
</div>

Leaderboard

</button>

<button class="nav-btn"
onclick="goPage('friends.html')">

<div class="nav-icon">
👥
</div>

Friends

</button>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import { getAnalytics }
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";

import {

getAuth,

GoogleAuthProvider,

signInWithPopup,

onAuthStateChanged

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {

getFirestore,

doc,

getDoc,

setDoc

}
from
"https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyB5KdyKgHVuvmKRhu-tQQKaBsbUH9-Pz-E",

authDomain:
"iodonium-r-ea28a.firebaseapp.com",

projectId:
"iodonium-r-ea28a",

storageBucket:
"iodonium-r-ea28a.firebasestorage.app",

messagingSenderId:
"556058248851",

appId:
"1:556058248851:web:132044a66f3095646c6f66",

measurementId:
"G-Y71J98XK25"

};

const app =
initializeApp(firebaseConfig);

const analytics =
getAnalytics(app);

const auth =
getAuth(app);

const db =
getFirestore(app);

const provider =
new GoogleAuthProvider();

const bgm =
document.getElementById("bgm");

const click =
document.getElementById("click");

bgm.volume = 0.35;

click.volume = 0.6;

function playClick(){

click.currentTime = 0;

click.play();
}

window.goPage = function(page){

playClick();

setTimeout(()=>{

window.location.href = page;

},120);
};

async function login(){

playClick();

try{

const result =
await signInWithPopup(
auth,
provider
);

const user =
result.user;

const ref =
doc(
db,
"users",
user.uid
);

const snap =
await getDoc(ref);

if(!snap.exists()){

await setDoc(ref,{

name:
user.displayName,

photo:
user.photoURL,

xp:0,

friends:[],

createdAt:
Date.now()

});
}

const latest =
await getDoc(ref);

const data =
latest.data();

document
.getElementById("profilePic")
.src =
user.photoURL;

document
.getElementById("xp")
.innerText =
data.xp || 0;

document
.getElementById("menu")
.classList.remove("hidden");

document
.getElementById("loginBtn")
.classList.add("hidden");

bgm.play();

}catch(error){

alert(error.message);

console.log(error);
}
}

onAuthStateChanged(
auth,
async(user)=>{

if(user){

const ref =
doc(
db,
"users",
user.uid
);

const snap =
await getDoc(ref);

if(snap.exists()){

const data =
snap.data();

document
.getElementById("profilePic")
.src =
user.photoURL;

document
.getElementById("xp")
.innerText =
data.xp || 0;

document
.getElementById("menu")
.classList.remove("hidden");

document
.getElementById("loginBtn")
.classList.add("hidden");

bgm.play()
.catch(()=>{});
}
}
});

document
.getElementById("loginBtn")
.onclick = login;

document.addEventListener(
"click",
()=>{

bgm.play()
.catch(()=>{});

},{
once:true
});

</script>

</body>
</html>
